<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logica de Programação JavaScript</title>
</head>
<body>
    <h1>Logica de Programação comJavaScript</h1>

    <script>

        //pedir para o usuario digitar dois numero
        var n1 = prompt("digite um numero");

        //converter em numero inteiro
        n1 = parseInt(n1)

        //pedir para  usuario digitar outro numero
        var n2 = prompt("digite outro numero");

        //converter em numero inteiro
        n2 = parseInt(n2)

        //motrar num alert o seguinte texto o resto da divisao de (n1) por (n2) é: reultado;
        alert("o resto da divisao de " + n1 + " por " + n2 + " é: " + (n1 % n2));

        //motrar num alert o segunitente texto o numero(n1) elevado a (n2) é: resultado;
        alert("o numero " + n1 + " elevado a " + n2 + " é: " + (n1 ** n2));

    </script>
</body>
</html>
