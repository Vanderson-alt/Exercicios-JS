<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logica de Programação JavaScript</title>
</head>
<body>
    <h1>Logica de Programação com JavaScript</h1>

    <button onclick="areaAlert()">mostrar area num alert</button>

    <button onclick="areaOutput()"> mostrar area no output</button>

    <div id="output"></div>

   <script>

        

        function areaAlert(){

            var largura = prompt('digite uma largura')
            largura = parseFloat(largura);

            var altura = prompt('digite uma altura')
            altura = parseFloat(altura);


            var area = calcularArea(largura, altura);

            alert('a area total é: ' + area)
        }

        function areaOutput(){

            var largura = prompt('digite uma largura')
            largura = parseFloat(largura);

            var altura = prompt('digite uma altura')
            altura = parseFloat(altura);

            var area = calcularArea(largura, altura)

            document.querySelector('#output').innerHTML = 'area total é: ' + area;
        }

        function calcularArea(l, a){
            return l * a;
            
        }

   </script>
</body>
</html>
