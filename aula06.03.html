<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logica de Programação JavaScript</title>
</head>
<body>
    <h1>Logica de Programação com JavaScript</h1>

    
    <div id="output"></div>

    <script>

        var produtos = [
            {'nome': 'caneta', 'preco': 2}, 
            {'nome': 'lapis', 'preco': 1.2},
            {'nome': 'borracha', 'preco': 0.5}
        ];

        var msg = '';

        for(var i = 0; i < produtos.length; i++){
            console.log(produtos[i].preco);

            msg += '<h2>produto: '+ produtos[i].nome +'</h2>';
            msg += '<p>preco: R$ '+ produtos[i].preco +'</p>';
        }

        document.querySelector('#output').innerHTML = msg;

    </script>

</body>
</html>
