<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logica de Programação JavaScript</title>
</head>
<body>
    <h1>Logica de Programação com JavaScript</h1>

    <script>
        var nome = prompt("qual seu nome?");
        alert("Bem-vindo," + nome);

        var endereco = 1.2 // numero decimal / numero real
        var estagravido = false // booleano (true ou false)

    /*
        var = palavra reservada para declarar uma variável
        nome = nome da variável
        prompt() = função para solicitar uma entrada do usuário
        alert() = função para exibir uma mensagem para o usuário
    */
    </script>
</body>
</html>
