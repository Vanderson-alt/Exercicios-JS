<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logica de Programação JavaScript</title>
</head>
<body>
    <h1>Logica de Programação comJavaScript</h1>

    <script>
        
        //fazer jogador1 digitar um numero
        var n1 = prompt("Jogador 1, digite um numero");
        n1 = parseInt(n1);

        //fazer jogador2 digitar um numero
        var n2 = prompt("Jogador 2, digite um numero");
        n2 = parseInt(n2);

        //se forem iguais, mostrar "Empate"
        if(n1 === n2){
            alert("Empate");
        } else {

            //sortear um numero entre 0 e 1
            var sorteado = parseInt(Math.random() * 2);
            alert("sorteado: " + sorteado)

        //se o numero sorteado for 0, ganha quem escolher um numero MENOR

        if((sorteado === 0 && n1 < n2) || (sorteado === 1 && n1 > n2)){
            alert("ganhou o jogador 1")
        } else {
            alert("ganhou o jogador 2")
        }


    }
    </script>
</body>
</html>
