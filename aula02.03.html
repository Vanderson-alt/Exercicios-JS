<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logica de Programação JavaScript</title>
</head>
<body>
    <h1>Logica de Programação comJavaScript</h1>

    <script>

        //pedir para o usuario digitar dois numero
        var n1 = prompt("digite um numero");
        n1 = parseFloat(n1)

        var n2 = prompt("digite outro numero");
        n2 = parseFloat(n2)

        var media = (n1 + n2) / 2;

        alert("a media é: " + media)

    </script>
</body>
</html>
