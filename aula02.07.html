<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logica de Programação JavaScript</title>
</head>
<body>
    <h1>Logica de Programação comJavaScript</h1>

    <script>
        var n1 = prompt("Digite um numero: ")
        n1 = parseFloat(n1)

        var n2 = parseFloat(prompt("Digite outro numero: "))

        var media = (n1 + n2) / 2


        if(n1 === 0 || n2 === 0 || media <=5){
            alert("reprovado")
        } else {
            alert("aprovado")
        }
    </script>
</body>
</html>
