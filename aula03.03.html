<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logica de Programação JavaScript</title>
</head>
<body>
    <h1>Logica de Programação comJavaScript</h1>

    <script>
        var ano = 1004;

        while(ano <= 2017){

            if( !(ano % 100 === 0) || (ano % 400 === 0 )) {
                document.write(ano + "<br>");
            } else {
                document.write(ano + "nao é bissexto <br>")
            }

            
            //ano = ano + 4;
            ano += 4;
        }
    </script>
</body>
</html>
