<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logica de Programação JavaScript</title>
</head>
<body>
    <h1>Logica de Programação comJavaScript</h1>

    <script>
        var n = prompt("digite um numero")
        n = parseInt(n)

        switch(n){
            case 1:
                alert("boa escolha")
                break
            case 2:
                alert("legal")
                break
            case 3:
                alert("caramba")  
            default:
                alert("ecolha de 1 a 3")
        }
    </script>
</body>
</html>
