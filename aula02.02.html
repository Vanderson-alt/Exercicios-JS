<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logica de Programação JavaScript</title>
</head>
<body>
    <h1>Logica de Programação comJavaScript</h1>

    <script>
        
        //pedir para o usuario digitar um numero
        var n1 = prompt("Digite um numero");

        // converter a string para numero decimal
        n1 = parseFloat(n1)

        //pedir parar o usuario digitar outro numero
        var n2 = prompt("Digite outro numero");

        n2 = parseFloat(n2) // converter a string para numero decimal

        //mostrar a soma
        alert( n1 + n2 );

    </script>
</body>
</html>
