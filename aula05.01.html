<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logica de Programação JavaScript</title>
</head>
<body>
    <h1>Logica de Programação com JavaScript</h1>

    <div id="output"></div>

    <script>

        var produtos = new Array('caneta', 'lapis', 'borracha', 'caderno');

        produtos.push('estojo');
        produtos.push('mochila');

        var output = document.querySelector('#output');

        var msg = '';
        for (var i = 0; i < produtos.length; i++){
            msg += 'produto '+ (i+1) + ': ' + produtos[i] + '<br>';
        }

        output.innerHTML = msg;

    </script>

</body>
</html>
